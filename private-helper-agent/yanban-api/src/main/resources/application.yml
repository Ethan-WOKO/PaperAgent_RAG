spring:
  application:
    name: yanban-api
  profiles:
    default: dev
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

yanban:
  jwt:
    secret: ${JWT_SECRET:dev_only_change_me_please_32_chars_minimum}
    access-token-ttl: 1h
    refresh-token-ttl: 7d
